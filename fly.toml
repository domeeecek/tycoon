# fly.toml file generated for tycoon-app on Fly

app = "tycoon-app"
primary_region = "ams"

[build]
  builder = "dockerfile"
  dockerfile = "Dockerfile.prod"

[env]
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[processes]
  app = "/bin/sh -c \"cd server && npm start\""
